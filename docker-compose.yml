services:
  api:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    image: mosogrean/node-fund:v1.0.1
    container_name: node-fund-api
    restart: unless-stopped
    ports:
      - "30000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
